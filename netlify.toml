# Netlify-Konfiguration für die WCW-Website (Astro, statischer Build)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Node-Version für den Build (entspricht der lokalen Umgebung)
  NODE_VERSION = "22"

# Sicherheits-Header für alle Seiten.
# Bewusst ohne strenge Content-Security-Policy, damit Simple Analytics und
# die Form.taxi-Übermittlung nicht blockiert werden.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Lokale Schriften langfristig cachen (Dateinamen sind stabil).
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Von Astro gehashte Assets dürfen unbegrenzt gecacht werden.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
